<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Jobs - Find Your Dream Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .job-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .search-input:focus { box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Clerk SDK -->
    <script defer crossorigin="anonymous" src="https://clerk.leafletjobs.pages.dev/npm/@clerk/ui@1/dist/ui.browser.js" type="text/javascript"></script>
    <script defer crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsubGVhZmxldGpvYnMucGFnZXMuZGV2JA" src="https://clerk.leafletjobs.pages.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js" type="text/javascript"></script>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-leaf text-green-600 text-2xl"></i>
                    <span class="text-xl font-bold text-gray-900">Leaflet Jobs</span>
                </div>
                <div id="auth-buttons" class="flex items-center space-x-4">
                    <button onclick="showSignIn()" class="text-gray-600 hover:text-gray-900 font-medium">Sign In</button>
                    <button onclick="showSignUp()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 font-medium">Sign Up</button>
                </div>
                <div id="user-menu" class="hidden items-center space-x-4">
                    <span id="user-email" class="text-gray-600"></span>
                    <button onclick="signOut()" class="text-gray-600 hover:text-gray-900 font-medium">Sign Out</button>
                    <button onclick="showPostJobModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 font-medium">
                        <i class="fas fa-plus mr-2"></i>Post Job
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="gradient-bg py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Find Your Dream Job</h1>
            <p class="text-xl text-white/90 mb-8">Discover thousands of job opportunities with all the information you need.</p>
            
            <!-- Search Bar -->
            <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-4">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 relative">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-keyword" placeholder="Job title, keywords, or company" 
                            class="search-input w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                    <div class="flex-1 relative">
                        <i class="fas fa-map-marker-alt absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-location" placeholder="City, state, or zip code" 
                            class="search-input w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                    <button onclick="searchJobs()" class="bg-green-600 text-white px-8 py-3 rounded-lg hover:bg-green-700 font-semibold transition">
                        Find Jobs
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters Section -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-wrap gap-4 items-center">
                <select id="filter-job-type" onchange="searchJobs()" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-green-500">
                    <option value="">Job Type</option>
                    <option value="full-time">Full-time</option>
                    <option value="part-time">Part-time</option>
                    <option value="contract">Contract</option>
                    <option value="internship">Internship</option>
                </select>
                <select id="filter-experience" onchange="searchJobs()" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-green-500">
                    <option value="">Experience Level</option>
                    <option value="entry">Entry Level</option>
                    <option value="mid">Mid Level</option>
                    <option value="senior">Senior Level</option>
                    <option value="executive">Executive</option>
                </select>
                <select id="filter-salary" onchange="searchJobs()" class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-green-500">
                    <option value="">Salary Range</option>
                    <option value="0-50000">$0 - $50,000</option>
                    <option value="50000-75000">$50,000 - $75,000</option>
                    <option value="75000-100000">$75,000 - $100,000</option>
                    <option value="100000-150000">$100,000 - $150,000</option>
                    <option value="150000+">$150,000+</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Job Listings -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Job Listings</h2>
            <span id="job-count" class="text-gray-600">Loading jobs...</span>
        </div>
        <div id="job-listings" class="space-y-4">
            <!-- Job cards will be inserted here -->
        </div>
    </div>

    <!-- Post Job Modal -->
    <div id="post-job-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-bold text-gray-900">Post a Job</h3>
                    <button onclick="hidePostJobModal()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <form id="post-job-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Job Title *</label>
                    <input type="text" id="job-title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name *</label>
                    <input type="text" id="job-company" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location *</label>
                    <input type="text" id="job-location" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Job Type *</label>
                        <select id="job-type" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                            <option value="full-time">Full-time</option>
                            <option value="part-time">Part-time</option>
                            <option value="contract">Contract</option>
                            <option value="internship">Internship</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Experience Level *</label>
                        <select id="job-experience" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                            <option value="entry">Entry Level</option>
                            <option value="mid">Mid Level</option>
                            <option value="senior">Senior Level</option>
                            <option value="executive">Executive</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Min Salary ($)</label>
                        <input type="number" id="job-salary-min" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Max Salary ($)</label>
                        <input type="number" id="job-salary-max" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Job Description *</label>
                    <textarea id="job-description" required rows="5" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Requirements</label>
                    <textarea id="job-requirements" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-semibold transition">
                    Post Job
                </button>
            </form>
        </div>
    </div>

    <script>
        // Configuration - Replace with your actual credentials
        const SUPABASE_URL = 'https://wdiqlfmktaazgstrvdlv.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_tFgxRAPnRQkcxzeyYCWEhA_5TNcAZ6n';
        
        let supabaseClient;
        let currentUser = null;

        // Initialize Clerk
        window.addEventListener('load', async function () {
            try {
                await Clerk.load({
                    ui: { ClerkUI: window.__internal_ClerkUICtor },
                });
                console.log('ClerkJS is loaded');
                
                // Initialize Supabase
                const { createClient } = supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Check authentication state
                checkAuthState();
                
                // Load initial jobs
                loadJobs();
            } catch (error) {
                console.error('Error initializing Clerk:', error);
            }
        });

        // Check authentication state
        async function checkAuthState() {
            if (Clerk.user) {
                currentUser = Clerk.user;
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('flex');
                document.getElementById('user-email').textContent = currentUser.primaryEmailAddress?.emailAddress || '';
                
                // Create Supabase user if not exists
                await syncUserWithSupabase();
            } else {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('flex');
            }
        }

        // Sync Clerk user with Supabase
        async function syncUserWithSupabase() {
            if (!currentUser) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .upsert({
                        id: currentUser.id,
                        email: currentUser.primaryEmailAddress?.emailAddress,
                        first_name: currentUser.firstName,
                        last_name: currentUser.lastName,
                        created_at: new Date().toISOString()
                    }, {
                        onConflict: 'id'
                    });
                
                if (error) console.error('Error syncing user:', error);
            } catch (error) {
                console.error('Error syncing user with Supabase:', error);
            }
        }

        // Show Clerk Sign In
        function showSignIn() {
            window.location.href = 'sign-in.html';
        }

        // Show Clerk Sign Up
        function showSignUp() {
            window.location.href = 'sign-up.html';
        }

        // Sign Out
        async function signOut() {
            await Clerk.signOut();
            currentUser = null;
            checkAuthState();
        }

        // Load jobs from Supabase
        async function loadJobs(filters = {}) {
            try {
                let query = supabase
                    .from('jobs')
                    .select('*')
                    .order('created_at', { ascending: false });

                // Apply filters
                if (filters.keyword) {
                    query = query.or(`title.ilike.%${filters.keyword}%,company.ilike.%${filters.keyword}%,description.ilike.%${filters.keyword}%`);
                }
                if (filters.location) {
                    query = query.ilike('location', `%${filters.location}%`);
                }
                if (filters.jobType) {
                    query = query.eq('job_type', filters.jobType);
                }
                if (filters.experience) {
                    query = query.eq('experience_level', filters.experience);
                }
                if (filters.salary) {
                    const [min, max] = filters.salary.split('-').map(s => parseInt(s.replace('+', '')));
                    if (max) {
                        query = query.gte('salary_min', min).lte('salary_max', max);
                    } else {
                        query = query.gte('salary_min', min);
                    }
                }

                const { data, error } = await query;
                
                if (error) throw error;
                
                displayJobs(data || []);
            } catch (error) {
                console.error('Error loading jobs:', error);
                // Display sample jobs if Supabase is not configured
                displaySampleJobs();
            }
        }

        // Display jobs
        function displayJobs(jobs) {
            const container = document.getElementById('job-listings');
            document.getElementById('job-count').textContent = `${jobs.length} jobs found`;
            
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-search text-gray-300 text-6xl mb-4"></i>
                        <p class="text-gray-500 text-lg">No jobs found matching your criteria</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(job => `
                <div class="job-card bg-white rounded-xl shadow-sm border border-gray-200 p-6 transition duration-200 cursor-pointer">
                    <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-start gap-4">
                                <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-emerald-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">
                                    ${job.company.charAt(0).toUpperCase()}
                                </div>
                                <div class="flex-1">
                                    <h3 class="text-xl font-semibold text-gray-900 hover:text-green-600">${job.title}</h3>
                                    <p class="text-gray-600 font-medium">${job.company}</p>
                                    <div class="flex flex-wrap gap-3 mt-2 text-sm text-gray-500">
                                        <span><i class="fas fa-map-marker-alt mr-1"></i>${job.location}</span>
                                        <span><i class="fas fa-briefcase mr-1"></i>${formatJobType(job.job_type)}</span>
                                        <span><i class="fas fa-layer-group mr-1"></i>${formatExperience(job.experience_level)}</span>
                                    </div>
                                    ${job.salary_min || job.salary_max ? `
                                        <p class="text-green-600 font-semibold mt-2">
                                            ${formatSalary(job.salary_min, job.salary_max)}
                                        </p>
                                    ` : ''}
                                </div>
                            </div>
                            <p class="text-gray-600 mt-4 line-clamp-2">${job.description}</p>
                        </div>
                        <div class="flex md:flex-col gap-2">
                            <button class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 font-medium transition">
                                Apply Now
                            </button>
                            <button class="border border-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-50 font-medium transition">
                                Save
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Display sample jobs (for demo purposes)
        function displaySampleJobs() {
            const sampleJobs = [
                {
                    id: 1,
                    title: 'Senior Frontend Developer',
                    company: 'TechCorp Inc.',
                    location: 'San Francisco, CA',
                    job_type: 'full-time',
                    experience_level: 'senior',
                    salary_min: 120000,
                    salary_max: 160000,
                    description: 'We are looking for a Senior Frontend Developer to join our team and help build amazing user experiences using React, TypeScript, and modern web technologies.'
                },
                {
                    id: 2,
                    title: 'Product Manager',
                    company: 'InnovateTech',
                    location: 'New York, NY',
                    job_type: 'full-time',
                    experience_level: 'mid',
                    salary_min: 90000,
                    salary_max: 120000,
                    description: 'Join our product team to drive the development of cutting-edge SaaS products. You will work closely with engineering, design, and marketing teams.'
                },
                {
                    id: 3,
                    title: 'UX Designer',
                    company: 'DesignHub',
                    location: 'Remote',
                    job_type: 'contract',
                    experience_level: 'mid',
                    salary_min: 80000,
                    salary_max: 100000,
                    description: 'Looking for a talented UX Designer to create intuitive and beautiful user interfaces for our mobile and web applications.'
                },
                {
                    id: 4,
                    title: 'Data Scientist',
                    company: 'DataDriven Co.',
                    location: 'Austin, TX',
                    job_type: 'full-time',
                    experience_level: 'senior',
                    salary_min: 130000,
                    salary_max: 170000,
                    description: 'We are seeking a Data Scientist to help us extract insights from complex datasets and build machine learning models that drive business decisions.'
                },
                {
                    id: 5,
                    title: 'Marketing Intern',
                    company: 'GrowthLabs',
                    location: 'Chicago, IL',
                    job_type: 'internship',
                    experience_level: 'entry',
                    salary_min: 30000,
                    salary_max: 40000,
                    description: 'Great opportunity for students to gain hands-on experience in digital marketing, social media management, and content creation.'
                }
            ];
            
            displayJobs(sampleJobs);
        }

        // Search jobs
        function searchJobs() {
            const filters = {
                keyword: document.getElementById('search-keyword').value,
                location: document.getElementById('search-location').value,
                jobType: document.getElementById('filter-job-type').value,
                experience: document.getElementById('filter-experience').value,
                salary: document.getElementById('filter-salary').value
            };
            
            loadJobs(filters);
        }

        // Show Post Job Modal
        function showPostJobModal() {
            document.getElementById('post-job-modal').classList.remove('hidden');
        }

        // Hide Post Job Modal
        function hidePostJobModal() {
            document.getElementById('post-job-modal').classList.add('hidden');
            document.getElementById('post-job-form').reset();
        }

        // Post Job Form Submit
        document.getElementById('post-job-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!currentUser) {
                alert('Please sign in to post a job');
                return;
            }

            const jobData = {
                title: document.getElementById('job-title').value,
                company: document.getElementById('job-company').value,
                location: document.getElementById('job-location').value,
                job_type: document.getElementById('job-type').value,
                experience_level: document.getElementById('job-experience').value,
                salary_min: parseInt(document.getElementById('job-salary-min').value) || null,
                salary_max: parseInt(document.getElementById('job-salary-max').value) || null,
                description: document.getElementById('job-description').value,
                requirements: document.getElementById('job-requirements').value,
                posted_by: currentUser.id,
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabaseClient
                    .from('jobs')
                    .insert([jobData])
                    .select();

                if (error) throw error;
                
                alert('Job posted successfully!');
                hidePostJobModal();
                loadJobs();
            } catch (error) {
                console.error('Error posting job:', error);
                alert('Error posting job. Please try again.');
            }
        });

        // Helper functions
        function formatJobType(type) {
            const types = {
                'full-time': 'Full-time',
                'part-time': 'Part-time',
                'contract': 'Contract',
                'internship': 'Internship'
            };
            return types[type] || type;
        }

        function formatExperience(level) {
            const levels = {
                'entry': 'Entry Level',
                'mid': 'Mid Level',
                'senior': 'Senior Level',
                'executive': 'Executive'
            };
            return levels[level] || level;
        }

        function formatSalary(min, max) {
            if (!min && !max) return '';
            if (!max) return `$${min.toLocaleString()}+`;
            if (!min) return `Up to $${max.toLocaleString()}`;
            return `$${min.toLocaleString()} - $${max.toLocaleString()}`;
        }

        // Close modals on outside click
        document.getElementById('post-job-modal').addEventListener('click', function(e) {
            if (e.target === this) hidePostJobModal();
        });
    </script>
</body>
</html>
