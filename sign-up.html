<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Leaflet Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Clerk SDK -->
    <script defer crossorigin="anonymous" src="https://topical-swine-37.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js" type="text/javascript"></script>
    <script defer crossorigin="anonymous" data-clerk-publishable-key="pk_test_dG9waWNhbC1zd2luZS0zNy5jbGVyay5hY2NvdW50cy5kZXYk" src="https://topical-swine-37.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js" type="text/javascript"></script>

    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-leaf text-green-600 text-2xl"></i>
                    <span class="text-xl font-bold text-gray-900">Leaflet Jobs</span>
                </div>
                <a href="index.html" class="text-gray-600 hover:text-gray-900 font-medium">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Jobs
                </a>
            </div>
        </div>
    </nav>

    <!-- Sign Up Container -->
    <div class="gradient-bg min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-xl shadow-2xl p-8">
                <div class="text-center mb-8">
                    <i class="fas fa-leaf text-green-600 text-5xl mb-4"></i>
                    <h2 class="text-3xl font-bold text-gray-900">Create Account</h2>
                    <p class="text-gray-600 mt-2">Join Leaflet Jobs to find your dream job</p>
                </div>
                
                <div id="clerk-sign-up"></div>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Already have an account? 
                        <a href="sign-in.html" class="text-green-600 hover:text-green-700 font-medium">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', async function () {
            try {
                await Clerk.load({
                    ui: { ClerkUI: window.__internal_ClerkUICtor },
                });
                
                // If already signed in, redirect to index
                if (Clerk.user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Mount Clerk SignUp component
                const signUpDiv = document.getElementById('clerk-sign-up');
                Clerk.mountSignUp(signUpDiv, {
                    afterSignUpUrl: 'index.html'
                });
            } catch (error) {
                console.error('Error initializing Clerk:', error);
            }
        });
    </script>
</body>
</html>
